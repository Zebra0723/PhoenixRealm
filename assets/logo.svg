<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Phoenix Realm">
  <defs>
    <linearGradient id="pr-coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F07A5E"/>
      <stop offset="1" stop-color="#D9483B"/>
    </linearGradient>
    <linearGradient id="pr-teal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1F8A86"/>
      <stop offset="1" stop-color="#36B3AC"/>
    </linearGradient>
    <linearGradient id="pr-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D38A"/>
      <stop offset="1" stop-color="#E2BB5C"/>
    </linearGradient>
  </defs>

  <!-- soft ring -->
  <circle cx="160" cy="160" r="150" fill="none" stroke="#1F8A86" stroke-opacity="0.16" stroke-width="3"/>

  <!-- rising phoenix, formed from clean stylised feather strokes -->
  <g transform="translate(160 168)">
    <!-- outer left wing -->
    <path d="M0 30 C-46 22 -86 -8 -104 -56 C-70 -36 -44 -34 -20 -44 C-44 -20 -50 4 -34 20 C-22 30 -10 32 0 30 Z" fill="url(#pr-teal)"/>
    <!-- outer right wing -->
    <path d="M0 30 C46 22 86 -8 104 -56 C70 -36 44 -34 20 -44 C44 -20 50 4 34 20 C22 30 10 32 0 30 Z" fill="url(#pr-coral)"/>
    <!-- inner left wing -->
    <path d="M0 38 C-30 36 -58 18 -72 -22 C-50 -10 -30 -10 -14 -20 C-30 -2 -32 18 -18 30 C-12 35 -6 38 0 38 Z" fill="url(#pr-coral)" opacity="0.92"/>
    <!-- inner right wing -->
    <path d="M0 38 C30 36 58 18 72 -22 C50 -10 30 -10 14 -20 C30 -2 32 18 18 30 C12 35 6 38 0 38 Z" fill="url(#pr-teal)" opacity="0.92"/>
    <!-- body + rising head -->
    <path d="M0 64 C-12 50 -14 30 -6 12 C-2 4 0 -8 0 -20 C2 -36 14 -52 36 -64 C30 -44 30 -32 38 -26 C24 -24 14 -14 10 0 C8 22 8 44 0 64 Z" fill="url(#pr-gold)"/>
    <!-- tail flames -->
    <path d="M0 64 C-6 86 -2 106 8 124 C10 102 12 86 18 72 Z" fill="url(#pr-coral)"/>
    <path d="M0 64 C-2 88 -10 106 -22 122 C-16 100 -12 84 -10 70 Z" fill="url(#pr-teal)"/>
  </g>
</svg>
